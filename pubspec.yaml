name: gourmet_go
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_3d_controller: ^2.0.2
  http: ^1.2.0
  camera: ^0.10.0
  audioplayers: ^6.0.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  video_player: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/models/
    - assets/audio/
    - assets/videos/
    - lib/fixtures/
